# Basic IG metadata
id: bha-test-ig
canonical: http://bha.colorado.gov/fhir/bha-test-ig
name: BHATestIG
title: "Colorado BHA FHIR Implementation Guide"
description: "A FHIR implementation guide to enable standardized behavioral health data exchange and reduce provider administrative burden throughout Colorado's behavioral health ecosystem"
status: draft
version: 0.1.0
fhirVersion: 4.0.1
copyrightYear: 2025+
releaseLabel: ci-build
jurisdiction: 'http://unstats.un.org/unsd/methods/m49/m49.htm#840'

# Publisher information
publisher:
  name: Colorado Behavioral Health Administration
  url: https://bha.colorado.gov
  email: cdhs_bha_provider_support@state.co.us

# Dependencies
dependencies:
  hl7.fhir.us.core: 
    version: 6.1.0
    id: uscore
  hl7.fhir.us.military-service: 1.0.0
  hl7.fhir.uv.sdc: 3.0.0
  
# Global settings
parameters: # see https://confluence.hl7.org/display/FHIR/Implementation+Guide+Parameters
  show-inherited-invariants: false
  usage-stats-opt-out: true
  shownav: true
  apply-contact: 'true'
  apply-jurisdiction: 'true'
  apply-publisher: 'true'
  apply-version: 'true'
  pin-canonicals: pin-multiples

# Pages structure
pages:
  index.md:
    title: Home
  guidance.md:
    title: Implementation Guidance
  profiles.md:
    title: Profiles
  questionnaires.md:
    title: Questionnaires
  terminology.md:
    title: Terminology
  about.md:
    title: About

menu:
  Home: index.html
  Guidance: guidance.html
  Profiles: profiles.html
  Questionnaires: questionnaires.html
  Terminology: terminology.html
  Artifacts: artifacts.html
  About: about.html
