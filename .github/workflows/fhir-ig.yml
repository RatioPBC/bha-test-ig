on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  fhir-ig-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: pull image
        run: |
          docker pull ghcr.io/ratiopbc/fhir-ig-publisher:2.0.17

      - name: build
        run: |
          docker run \
            --rm \
            -v `pwd`:/workspaces/bha-test-ig \
            ghcr.io/ratiopbc/fhir-ig-publisher:2.0.17 \
            -ig /workspaces/bha-test-ig \
            -tx n/a

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./output/

      - uses: actions/deploy-pages@v4
