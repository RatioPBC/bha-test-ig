on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  fhir-ig-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: build
        run: |
          docker run --rm -it ghcr.io/ratiopbc/fhir-ig-publisher:2.0.17 \
            -ig /workspaces/bha-test-ig \
            -tx n/a

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

      - uses: actions/deploy-pages@v4
