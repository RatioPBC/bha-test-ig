on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: pull image
        run: |
          docker pull ghcr.io/ratiopbc/fhir-ig-publisher:2.0.17

      - name: build
        id: build
        run: |
          docker run \
            --rm \
            -v `pwd`:/workspaces/bha-test-ig \
            ghcr.io/ratiopbc/fhir-ig-publisher:2.0.17 \
            -ig /workspaces/bha-test-ig \
            -tx n/a

      - uses: actions/upload-pages-artifact@v3
        id: deployment
        with:
          path: ./output/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
